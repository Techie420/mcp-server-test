<article class="input-card">
  <h2 class="card-title">Request By Text</h2>
  <p class="card-copy">Know the song already? Type it in, assign the right DJ admin, and search for the cleanest match before you send it to the booth.</p>
  <form method="post" class="stack js-submit-form">
    <input type="hidden" name="form_type" value="request">
    <div class="field-grid">
      <label>
        Song Title
        <input type="text" name="song_title" placeholder="Blinding Lights" {% if active_form == "request" %}value="{{ request.form.get('song_title', '') }}"{% endif %}>
      </label>
      <label>
        Artist Name
        <input type="text" name="artist_name" placeholder="The Weeknd" {% if active_form == "request" %}value="{{ request.form.get('artist_name', '') }}"{% endif %}>
      </label>
      <label>
        Admin
        <select name="assigned_admin_id" required>
          <option value="">Select Admin</option>
          {% for admin in admins %}
            <option value="{{ admin.id }}" {% if request.form.get("assigned_admin_id") == (admin.id|string) %}selected{% endif %}>{{ admin.username }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <p class="muted-note">This keeps the same search-and-request flow, just framed like a live song handoff.</p>
    <div class="btn-row">
      <button class="btn primary" type="submit">Find and Request</button>
    </div>
  </form>
</article>
