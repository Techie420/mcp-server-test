version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DB_BACKEND: ${DB_BACKEND:-sql}
      SQLALCHEMY_DATABASE_URL: ${SQLALCHEMY_DATABASE_URL:-postgresql+psycopg2://app:app@db:5432/orders}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-mcp_chatbot}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: {}
  mongodata: {}


